<!DOCTYPE html>
<html lang="vi">
<head> 
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Progress Steps and Progress Bar</title>
    <link rel="stylesheet" href="style.css"/>
    <script src="script.js" defer>  </script>
</head>

<body>
    <div class="container">
        <div class="header" >
        <h1>Progress Steps</h1>
            </div>

        <div class="progress-container">
            <!--Đường kẻ nền xám của thanh tiến trình--> 
            <div class="progress-background"></div>

            <!-- Đường kẻ xanh của thanh tiến trình, sẽ được điều chỉnh chiều rộng theo tiến độ -->
            <div class="progress-fill" id="progress-fill"></div>

            <!-- Các vòng tròn đại diện cho các bước, sẽ được tô màu khi bước đó được kích hoạt -->
            <div class="circle active">1</div>
            <div class="circle">2</div>
            <div class="circle">3</div>
            <div class="circle">4</div>
        </div>
        <button class="btn" id="prev" disabled>Prev</button>
        <button class="btn" id="next">Next</button>
    </div>
</body>
</html>
